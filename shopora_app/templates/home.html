{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" >
</head>
<body>
  <nav>
    <div class="logo">
        <img src="{% static 'images/shopora_logo.png' %}"
        alt="Shopora Logo"
        width="200" height="75">
    </div><br>
    <div class="navlinks">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'profile' %}">Profile</a>
            <a href="{% url 'wishlist' %}">Wishlist</a>
            <a href="{% url 'cart' %}">Cart({{ cart_count }})</a>
            <a href="{% url 'login_user' %}">Logout</a>
    </div>       
  </nav>
<div class="product">
  {% for i in product %}
  <div class="product_card">
    <img src="{{ i.image.url }}" style="height: 150px;width: 150px;">
    <h3>{{ i.product_name }}</h3>
    <p>{{ i.description }}</p>
    <h4>₹{{ i.price }}</h4>
    <button><a href="{% url 'addcart' i.id %}">Add to Cart</a></button>
    <button><a href="{% url 'addwish' i.id %}">Add to Wishlist</a></button>
  </div>
  {% endfor %}
</div>  
</body>
</html>
