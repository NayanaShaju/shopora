<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="container">
    <h2>Edit Profile</h2>

    <form method="POST">
        {% csrf_token %}

        <label for="name">Username</label>
        <input type="text" id="name" name="edit_name" value="{{user.username}}">

        <label for="email">Email</label>
        <input type="email" id="email" name="edit_email" value="{{user.email}}">

        <label for="address">Address</label>
        <input type="text" id="address" name="edit_address" value="{{profile_table.address}}">

        <label for="number">Contact Number</label>
        <input type="text" id="number" name="edit_num" value="{{profile_table.contact_number}}">

        <button type="submit">Confirm</button>
    </form>
</div>
</body>
</html>
