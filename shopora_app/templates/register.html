<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register shopora</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}"> 
</head>
<body>
<div class="container">
    <img src="{% static 'images/shopora_logo.png' %}"
     alt="Shopora Logo"
     width="200" height="100">  
    <h2>Register</h2>

    <form method="POST">
        {% csrf_token %}

        <label for="name">Username</label>
        <input type="text" id="name" name="reg_name">

        <label for="email">Email</label>
        <input type="email" id="email" name="reg_email">

        <label for="password">Password</label>
        <input type="password" id="password" name="reg_pass">

        <label for="address">Address</label>
        <input type="text" id="address" name="reg_address">

        <label for="number">Contact Number</label>
        <input type="text" id="number" name="reg_num">

        <button type="submit">Register</button>
    </form>
</div>
</body>
</html>
